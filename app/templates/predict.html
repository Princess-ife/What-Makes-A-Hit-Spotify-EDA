<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Your Song's Popularity</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-brand">HitPredictor</div>
    </nav>

    <main class="predict-hero">
        <h1>Predict Your Song's Popularity</h1>
        <p class="subtitle">
            Enter your song's audio features and find out if it has the potential to be a hit or a flop!
        </p>


        <form action="/predict" method="post" class="predict-form">
            <div class="form-group">
                <label for="artist">Artist Name</label>
                <input type="text" id="artist" name="artist" placeholder="e.g. Burna Boy" required>
            </div>

            <div class="form-group">
                <label for="genre">Genre</label>
                <select id="genre" name="genre" required>
                    <option value="">Select a genre</option>
                    <option value="pop">Pop</option>
                    <option value="rock">Rock</option>
                    <option value="hip-hop">Hip-Hop</option>
                    <option value="electronic">Electronic</option>
                    <option value="r&b">R&B</option>
                    <option value="country">Country</option>
                    <option value="latin">Latin</option>
                    <option value="reggae">Reggae</option>
                    <option value="jazz">Jazz</option>
                    <option value="classical">Classical</option>
                    <option value="gospel">Gospel</option>
                    <option value="folk">Folk</option>
                    <option value="afrobeats">Afrobeats</option>
                    <option value="k-pop">K-Pop</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="danceability">Danceability (0.0 - 1.0)</label>
                <input type="number" id="danceability" name="danceability" step="0.01" min="0" max="1" required>
            </div>

            <div class="form-group">
                <label for="energy">Energy (0.0 - 1.0)</label>
                <input type="number" id="energy" name="energy" step="0.01" min="0" max="1" required>
            </div>

            <div class="form-group">
                <label for="loudness">Loudness (dB)</label>
                <input type="number" id="loudness" name="loudness" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="valence">Valence (0.0 - 1.0)</label>
                <input type="number" id="valence" name="valence" step="0.01" min="0" max="1" required>
            </div>

            <div class="form-group">
                <label for="tempo">Tempo (BPM)</label>
                <input type="number" id="tempo" name="tempo" step="0.1" required>
            </div>

             <div class="form-group">
                <label for="duration">Duration (minutes)</label>
                <input type="number" id="duration" name="duration" placeholder="e.g. 3.5" step="0.1" required>
            </div>

             <div class="form-group">
                <label for="instrumentalness">Instrumentalness (0.0 - 1.0)</label>
                <input type="number" id="instrumentalness" name="instrumentalness" step="0.01" min="0" max="1" required>
            </div>

             <div class="form-group">
                <label for="speechiness">Speechiness (0.0 - 1.0)</label>
                <input type="number" id="speechiness" name="speechiness" step="0.01" min="0" max="1" required>
            </div>

             <div class="form-group">
               <label>Acousticness (0.0 - 1.0)</label>
                <input type="number" id="acousticness" name="acousticness" step="0.01" min="0" max="1" required>
            </div>

            <div style="grid-column: span 2; text-align: center; margin-top: 20px;">
                <button type="submit" class="btn-primary" style="border:none; cursor:pointer;">
                    Predict Popularity →
                </button>
            </div>
        </form>
    </main>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close-button"onclick="closeModal()">&times;</span>
            <div id="modalLoading">Analysing patterns...</div>
            <div id="modalBody" style="display:none;"></div>
                <h2 id="predictionResult" style="font-size: 3rem; margin: 1rem 0;">VIRAL</h2>
                <p id="predictionText" style="color: var(--text-secondary-color);"></p>
          </div>
        </div>
    </div>

    
    <script>
        const form = document.getElementById('predictForm');
        const modal = document.getElementById('resultModal');

        form.onsubmit = async (e) => {
            e.preventDefault();
            modal.style.display = "block";


            const formData = new FormData(form);
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            document.getElementById('modalLoading').style.display = 'none';
            document.getElementById('modalBody').style.display = 'block';
            document.getElementById('predictionResult').textContent = result.prediction;
            document.getElementById('predictionText').textContent = result.explanation;

            document.getElementById('predictionResult').style.color = `var(--${result.tier.toLowerCase()}-color)`;
        };

        function closeModal() {
            modal.style.display = "none";
            document.getElementById('modalLoading').style.display = 'block';
            document.getElementById('modalBody').style.display = 'none';
        } 
    </script>
</body>
</html>
